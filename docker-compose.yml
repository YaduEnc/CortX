services:
  api:
    build: .
    container_name: secondmind-api
    env_file:
      - .env
    command: /bin/sh -c "python -m app.bootstrap && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
      - whisper_models:/models
    networks:
      - secondmind-net

  worker:
    build: .
    container_name: secondmind-worker
    env_file:
      - .env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=1 -Q transcription
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
      - whisper_models:/models
    networks:
      - secondmind-net

  postgres:
    image: postgres:16-alpine
    container_name: secondmind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondmind}
      POSTGRES_DB: ${POSTGRES_DB:-secondmind}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondmind} -d ${POSTGRES_DB:-secondmind}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secondmind-net

  redis:
    image: redis:7-alpine
    container_name: secondmind-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - secondmind-net

  minio:
    image: minio/minio:latest
    container_name: secondmind-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - secondmind-net

  nginx:
    image: nginx:alpine
    container_name: secondmind-nginx
    depends_on:
      - api
    ports:
      - "8000:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - secondmind-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  hf_cache:
  whisper_models:

networks:
  secondmind-net:
    driver: bridge
